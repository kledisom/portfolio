<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/icono.min.css" />

    <title>my page</title>

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <aside id="menu">
      <div class="perfil">
        <img
          id="imgPerfil"
          src="comment-faire-pour-etre-autoentrepreneur-11.jpg"
        />
        <h4>KLEDISOM OLIVEIRA</h4>
        <nav>
          <img src="./ico/facebook.png" />
          <img src="./ico/instagram.png" />
          <img src="./ico/linkedin.png" />
          <img src="./ico/twitter.png" />
        </nav>
      </div>

      <div class="topicos">
        <nav>
          <div class="home">
            <i class="icono-home"></i>
            <a href="">Home</a>
          </div>
          <div class="user">
            <i class="icono-user"></i>
            <a href="">About</a>
          </div>
          <div class="resume">
            <i class="icono-document"></i>
            <a href="">Resumo</a>
          </div>
          <div class="portfolio">
            <i class="icono-book"></i>
            <a href="">Portfolio</a>
          </div>
        </nav>
      </div>

      <footer><h5>Copright KLEDISOM.DEV.BR</h5></footer>
    </aside>
    <div class="title-main">
      <div id="ico-menu">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <h1>Kledisom Oliveira</h1>
      <div class="hello cursor">
        <h3>Front-end developer.</h3>
      </div>
    </div>

    <script>
      //document.getElementById("menu").style.display = "none";

      var ocultarMenu = document.getElementById("imgPerfil");
      var mostrarMenu = document.getElementById("ico-menu");

      ocultarMenu.addEventListener("click", () => {
        document.getElementById("menu").style.display = "none";
        document.getElementById("ico-menu").style.display = "block";
      });

      mostrarMenu.addEventListener("click", () => {
        document.getElementById("menu").style.display = "block";
        document.getElementById("ico-menu").style.display = "none";
      });
    </script>
  </body>
</html>
